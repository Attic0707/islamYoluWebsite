<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <title>OG Image Template — Screenshot at 1200×630</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #eef7f0;
      background:
        radial-gradient(600px 400px at 15% 20%, rgba(214,182,109,.12), transparent 55%),
        radial-gradient(500px 350px at 85% 70%, rgba(120,255,190,.08), transparent 60%),
        linear-gradient(135deg, #07140f 0%, #0a1e16 40%, #0e2a1f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Subtle geometric pattern */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .3;
      background:
        radial-gradient(circle at 25% 20%, rgba(214,182,109,.08) 0 2px, transparent 3px) 0 0/38px 38px,
        radial-gradient(circle at 75% 70%, rgba(214,182,109,.06) 0 2px, transparent 3px) 0 0/44px 44px;
    }

    .card {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 60px;
      padding: 60px 80px;
    }

    .icon-area {
      flex-shrink: 0;
      width: 220px;
      height: 220px;
      border-radius: 44px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      border: 2px solid rgba(214,182,109,.25);
    }
    .icon-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* Fallback if no image */
    .icon-fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      font-size: 72px;
      font-weight: 900;
      color: #0b2119;
      background: linear-gradient(135deg, #d6b66d, #bda25d);
      letter-spacing: 2px;
    }

    .text-area {
      flex: 1;
    }

    .app-name {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 0.5px;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .tagline {
      font-size: 26px;
      color: #d6b66d;
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1.3;
    }

    .features {
      font-size: 20px;
      color: #b7d1c1;
      line-height: 1.6;
    }

    .badge {
      position: absolute;
      bottom: 50px;
      right: 80px;
      font-size: 16px;
      color: #86aa98;
      letter-spacing: 0.5px;
    }

    .divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, #d6b66d, transparent);
      border-radius: 2px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-area">
      <!-- Replace with: <img src="appIcon.png" alt="İslam Yolu"> -->
      <!-- For now using text fallback: -->
      <div class="icon-fallback">IY</div>
    </div>
    <div class="text-area">
      <div class="app-name">İslam Yolu</div>
      <div class="divider"></div>
      <div class="tagline">Ezan Vakitleri · Namaz Hatırlatıcı · Kur'an-ı Kerim</div>
      <div class="features">Ücretsiz İslami yaşam uygulaması — iOS & Android</div>
    </div>
  </div>
  <div class="badge">islam-yolu.com</div>
</body>
</html>
